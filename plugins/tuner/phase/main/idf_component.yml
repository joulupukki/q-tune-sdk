## IDF Component Manager Manifest — Phase plugin
##
## Pin lvgl to exactly 9.2.2 so the compiled plugin's struct layouts match the
## firmware. The loader rejects any major.minor mismatch. DO NOT change this pin.

dependencies:
  idf:
    version: ">=5.3.0"

  lvgl/lvgl: "==9.2.2"

  espressif/elf_loader: ">=1.3.0"
