## IDF Component Manager Manifest — example_standby plugin
##
## Pin lvgl to exactly 9.2.2 so the compiled plugin's struct layouts match the
## firmware binary. The loader compares the major.minor portion of lvgl_version
## in QTunePluginDescriptor and rejects any mismatch.

dependencies:
  idf:
    version: ">=5.3.0"

  lvgl/lvgl: "==9.2.2"

  espressif/elf_loader: ">=1.3.0"
